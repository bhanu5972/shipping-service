# Application
spring.application.name=shipping-service
server.port=8085

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/shipping_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.pattern.console={"timestamp":"%d{ISO8601}","level":"%p","service":"shipping-service","traceId":"%X{traceId}","message":"%m"}%n
logging.level.com.example.shipping=DEBUG

# Shipping carriers
shipping.carriers=FedEx,UPS,DHL